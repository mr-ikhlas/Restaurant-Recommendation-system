<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Recommendation System</title>

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Jost Font -->
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Jost', sans-serif;
            margin: 0;
        }

        /* HERO SECTION */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;

            background:
                linear-gradient(135deg, rgba(0,0,0,0.65), rgba(255,102,0,0.4)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1600&q=80');

            background-size: cover;
            background-position: center;
        }

        /* CARD */
        .hero-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px 30px;
            border-radius: 12px;
            max-width: 600px;
        }

        /* TITLE */
        .hero-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ffffff, #ffd6b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            margin-top: 15px;
            color: #f1f1f1;
            font-size: 1.1rem;
        }

        /* BUTTON */
        .btn-start {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            background: linear-gradient(135deg, #ff6a00, #ff914d);
            color: #fff;
            transition: 0.3s;
        }

        .btn-start:hover {
            background: linear-gradient(135deg, #e85f00, #ff7f32);
            transform: translateY(-2px);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .hero-title {
                font-size: 2rem;
            }

            .hero-card {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="hero">
    <div class="hero-card">

        <h1 class="hero-title">Restaurant Recommendation System</h1>

        <p class="hero-subtitle">
            Discover the best restaurants based on your taste, location, and budget.
        </p>

        <a href="/recommend" class="btn btn-start">
            Get Started →
        </a>

    </div>
</div>

</body>
</html>
